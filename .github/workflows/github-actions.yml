name: assignment-test
on: [push]

jobs:
  full-test:
    container: cuaesd/aesd-autotest:assignment4-buildroot
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v2
        with:
          submodules: recursive

      - name: Validate private key format (root)
        shell: bash
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p /root/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > /root/.ssh/id_ed25519
          chmod 600 /root/.ssh/id_ed25519

          # This fails if the key is invalid/corrupted/encrypted in a way SSH can't use non-interactively
          ssh-keygen -lf /root/.ssh/id_ed25519 >/dev/null
          echo "Key parses OK"

